version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: civicflow-postgres
    environment:
      POSTGRES_USER: civicflow
      POSTGRES_PASSWORD: civicflow_password
      POSTGRES_DB: civicflow_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: civicflow-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
