name: Bug report
description: Create a report to help us improve CivicFlow AI
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you did...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of CivicFlow AI are you using?
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code blocks, so no need for backticks.
      render: shell
